# Build, test, and prove
name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.26.1'

    - name: Build
      run: go build -v ./...

    - name: Test
      run: go test -v ./...

  prove:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - uses: actions/checkout@v4
    - uses: ahmedaabouzied/goprove-action@v1
      with:
        path: ./...
        fail-on-warnings: false  # Only fail on proven bugs — testdata has intentional warnings
